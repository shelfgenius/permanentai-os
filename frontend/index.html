<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI OS" />
    <meta name="description" content="Asistent AI personal multi-domeniu cu mascotă holografică" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <title>Personal AI OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased" style="background:#ffffff;color:#1d1d1f">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      /* ── iOS Safari stability: prevent pull-to-refresh, double-tap zoom, and
           overscroll bounce that crashes 3D canvases on WebKit ── */
      (function() {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (!isIOS) return;
        document.addEventListener('touchmove', function(e) {
          if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        /* Recover WebGL context lost (common on low-memory iOS) */
        document.addEventListener('webglcontextlost', function(e) {
          e.preventDefault();
          console.warn('[iOS] WebGL context lost — will restore on next frame');
        });
        document.addEventListener('webglcontextrestored', function() {
          console.info('[iOS] WebGL context restored');
        });
      })();
    </script>
  </body>
</html>
